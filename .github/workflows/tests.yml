name: tests

on:
  push:
  pull_request:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: run smoke tests
        run: python -m pytest tests/test_smoke.py -q

      - name: compile python files
        run: python -m compileall src database

      - name: run sample training
        run: python src/train_pd.py --source csv --csv-path data/sample/credit_risk_modeling_mart_sample.csv --skip-xgboost --max-rows 1000
